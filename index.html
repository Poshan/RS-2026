<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordinate-Based Map Viewer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.3.0/ol.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map-container {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
        }
        .map-wrapper {
            width: 45%;
        }
        #map, #leaflet-map {
            width: 100%;
            height: 1000px;
        }
        #controls {
            margin: 20px 0;
            text-align: center;
        }
        .map-label {
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<h2>Map Viewers</h2>
<div id="controls">
    <input type="text" id="lat" value="51.9623" />
    <input type="text" id="lon" value="7.6257" />
    <button onclick="updateMaps()">Go</button>
</div>

<div id="map-container">
    <div class="map-wrapper">
        <div class="map-label">OpenLayers</div>
        <div id="map"></div>
    </div>
    <div class="map-wrapper">
        <div class="map-label">Leaflet</div>
        <div id="leaflet-map"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ol@v7.3.0/dist/ol.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    // Initialize OpenLayers Map
    var olView = new ol.View({
        center: ol.proj.fromLonLat([7.6257, 51.9623]), // Set initial center to Münster's coordinates
        zoom: 10
    });

    var olMap = new ol.Map({
        target: 'map',
        layers: [
            new ol.layer.Tile({
                source: new ol.source.OSM()
            })
        ],
        view: olView
    });

    // Create a vector source and layer to hold the marker
    var olMarkerSource = new ol.source.Vector();
    var olMarkerLayer = new ol.layer.Vector({
        source: olMarkerSource
    });
    olMap.addLayer(olMarkerLayer);

    // Initialize Leaflet Map
    var leafletMap = L.map('leaflet-map').setView([51.9623, 7.6257], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18,
        attribution: '© OpenStreetMap contributors'
    }).addTo(leafletMap);

    // Variable to hold Leaflet marker for later updates
    var leafletMarker = L.marker([51.9623, 7.6257]).addTo(leafletMap);

    function updateMaps() {
        var lat = parseFloat(document.getElementById('lat').value);
        var lon = parseFloat(document.getElementById('lon').value);

        if (!isNaN(lat) && !isNaN(lon)) {
            var coords = [lon, lat];

            // Update OpenLayers
            olView.setCenter(ol.proj.fromLonLat(coords));
            olView.setZoom(6);

            // Remove previous markers in OpenLayers and add a new one
            olMarkerSource.clear();
            var olMarker = new ol.Feature({
                geometry: new ol.geom.Point(ol.proj.fromLonLat(coords))
            });
            var markerStyle = new ol.style.Style({
                image: new ol.style.Icon({
                    anchor: [0.5, 1],
                    src: 'https://openlayers.org/en/latest/examples/data/icon.png'
                })
            });
            olMarker.setStyle(markerStyle);
            olMarkerSource.addFeature(olMarker);

            // Update Leaflet
            if (leafletMarker) { leafletMarker.remove(); }
            leafletMarker = L.marker([lon, lat, ]).addTo(leafletMap);
            leafletMap.setView([lon, lat ], 6);

        } else {
            alert("Please enter valid coordinates.");
        }
    }

    // Initial call to place markers on the default coordinates
    updateMaps();
</script>

</body>
</html>
